<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowD" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="waveD" x1="100" y1="256" x2="412" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="sweepD" cx="256" cy="256" r="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="scopeD"><circle cx="256" cy="256" r="168"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0D1117"/>
  <rect x="1" y="1" width="510" height="510" rx="111" stroke="#21262D" stroke-width="2"/>

  <!-- inside the scope -->
  <g clip-path="url(#scopeD)">
    <!-- radar sweep wedge -->
    <path d="M256 256 L256 80 A176 176 0 0 1 432 256 Z" fill="url(#sweepD)"/>
    <!-- crosshair -->
    <path d="M256 80 V432 M80 256 H432" stroke="#2DD4BF" stroke-width="3" stroke-opacity="0.16"/>
    <!-- inner scope ring -->
    <circle cx="256" cy="256" r="108" stroke="#2DD4BF" stroke-width="5" stroke-opacity="0.30" fill="none"/>
    <!-- the live pulse / activity trace -->
    <path d="M88 256 H168 L196 256 L224 206 L252 318 L282 150 L312 322 L342 256 L368 256 H424"
          stroke="url(#waveD)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
          fill="none" filter="url(#glowD)"/>
  </g>

  <!-- outer scope ring -->
  <circle cx="256" cy="256" r="172" stroke="#2DD4BF" stroke-width="6" stroke-opacity="0.45" fill="none"/>
  <!-- tracked node at the signal peak -->
  <circle cx="282" cy="150" r="15" fill="#34D399" filter="url(#glowD)"/>
  <circle cx="282" cy="150" r="6" fill="#0D1117"/>
  <!-- center node -->
  <circle cx="256" cy="256" r="9" fill="#2DD4BF" filter="url(#glowD)"/>
</svg>
